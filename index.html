  <style>
    @font-face {
      font-family: 'TripFont';
      src: url('font.ttf') format('truetype');
      font-display: swap;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    :root { font-size: 22px; }
    body {
      margin: 0;
      padding: 0;
      font-family: 'TripFont', sans-serif;
      background: #eef2ff;
      user-select: none;
      line-height: 1.8;
      color: #1e293b;
      overflow: auto;
    }

    #root { height: 100%; }
    #root > * { height: 100%; }

    /* ✅ 手機實際使用：置中 + 不會跑版（桌機看也漂亮） */
    .app-outer{
      min-height: 100vh;
      display:flex;
      justify-content:center;
      align-items:stretch;
      padding: 0;
      background: radial-gradient(1200px 600px at 50% 0%, #dbeafe 0%, #eef2ff 55%, #f8fafc 100%);
    }
    .app-shell{
      width: 100%;
      max-width: 460px;  /* ✅ S23U 看起來不會太寬，桌機也能像手機 */
      height: 100vh;     /* ✅ 手機直接滿版 */
      background: #ffffff;
      position: relative;
      overflow: hidden; /* ✅ UI 不會跑出邊界 */
    }

    .glass { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(15px); }
    .btn-cute { transition: all 0.2s; box-shadow: 0 5px 0 #93c5fd; border: 2px solid #bfdbfe; }
    .btn-cute:active { transform: translateY(3px); box-shadow: 0 2px 0 #93c5fd; }

    .intro-scroll {
      font-size: 1.5rem;
      line-height: 2.3;
      font-weight: bold;
      overflow-y: auto;
      max-height: 58vh;
      padding-right: 10px;
      overflow-x: hidden;
      word-break: break-word;
      padding-bottom: 24px; /* ✅ 最下面字不會被擋 */
    }
    .item-card { background: white; border-radius: 40px; padding: 1.8rem; margin-bottom: 1.5rem; border: 2px solid #f1f5f9; }
    .info-card {
      background: white;
      border-radius: 40px;
      padding: 1.8rem;
      border-left: 14px solid #3b82f6;
      margin-bottom: 2rem;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
      overflow-x: hidden;
      word-break: break-word;
    }
    .intro-scroll::-webkit-scrollbar { width: 4px; }
    .intro-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }

    /* ✅ Header / Bottom 收起動畫 */
    .ui-slide { transition: transform .22s ease, opacity .22s ease; will-change: transform; }
    .ui-hide { transform: translateY(-110%); opacity: 0; pointer-events: none; }

    .bottom-hide { transform: translateY(110%); opacity: 0; pointer-events: none; }

    /* ✅ iOS 安全區 */
    .safe-bottom{
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 0.75rem);
    }

    /* ✅ Modal：讓 CLOSE 永遠可見，不會被擋 */
    .modal-wrap{
      position:absolute; inset:0;
      z-index: 60;
      background: rgba(0,0,0,0.7);
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 16px;
    }
    .modal-card{
      background:#fff;
      width: 100%;
      max-width: 96%;
      border-radius: 55px;
      padding: 32px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.25);
      display:flex;
      flex-direction:column;
      max-height: 86%;
      overflow:hidden;
    }
    .modal-body{
      overflow-y:auto;
      overflow-x:hidden;
      padding-right: 10px;
      padding-bottom: 18px; /* ✅ 底部留白 */
      -webkit-overflow-scrolling: touch;
      word-break: break-word;
    }
  </style>
</head>

          { name: "早上車屋休息", icon: "🛌", intro: "享受悠閒的極地早晨。" },

          { time: "19:15", name: "Sixt Autovuokraamo 還車", icon: "🚗", nav: "https://maps.app.goo.gl/R3EEnwb6gh3rkoXH8", intro: "記得先去加油站加滿油，結束租車自駕，前往羅瓦涅米火車站。" },
          { time: "21:00", name: "臥鋪火車回赫爾辛基", icon: "🚂", intro: "22車上層215、216車廂。" }

      {
        date: "3/17", title: "赫爾辛基巡禮 🇫🇮", cities: [{n:"赫爾辛基", q:"Helsinki"}], kpArea: "赫爾辛基",
        items: [
          { name: "Bob W Helsinki Kaarti", icon: "🏘️", nav: "https://maps.app.goo.gl/LrHxxTSFzfS9AiEbA", intro: "位於赫爾辛基市中心的現代設計風格公寓式飯店，主打無接觸自助入住、高CP值與時尚簡約風格。地理位置優越，鄰近集市廣場與電車站，交通便利。" },
          { name: "老農貿市場", icon: "🎪", nav: "https://maps.app.goo.gl/Xxj83Z79HFqy1se77", intro: "建於1889年，是芬蘭最古老的室內市場，座落於南碼頭旁。這裡曾是為提升食品衛生而建立，如今則是融合百年歷史與現代風格的熱門景點，乾淨整潔，販售新鮮海產、鮭魚湯、起司、馴鹿肉及特色伴手禮。" },
          { name: "SOUP+MORE 鮭魚湯", icon: "🍲", nav: "https://maps.app.goo.gl/URgMN58wNkSTpyHF9", intro: "位於赫爾辛基老農貿市場，是當地最著名的平價美食攤位。主打熱騰騰的芬蘭傳統奶油鮭魚湯 (Lohikeitto)，用料豐富，含鮭魚及馬鈴薯，另提供免費自助麵包與青醬，是高CP值的道地溫暖選擇。" },
          { name: "烏斯佩斯基大教堂", icon: "⛪", nav: "https://maps.app.goo.gl/m9uxHw6PrYXabQ889", intro: "建於1862-1868年，是北歐及西歐最大的東正教教堂。這座風格濃厚的「紅教堂」由俄國建築師設計，以紅色磚牆、金綠色洋蔥頂及13座象徵耶穌與使徒的尖塔為特色，呈現拜占庭式建築藝術。" },
          { name: "赫爾辛基座堂", icon: "⛪", nav: "https://maps.app.goo.gl/xyzWmWVRweKEm8Gc9", intro: "又稱「白教堂」，是芬蘭首都赫爾辛基的地標性建築。這座新古典主義風格的綠頂白牆教堂建於 1830-1852 年，矗立在參議院廣場，由德國建築師恩格爾設計，具有希臘十字平面、四面柱廊和中央大圓頂，周圍有四個小圓頂，顯現出對稱的宏偉美感。" },
          { name: "參議院廣場", icon: "🏛️", nav: "https://maps.app.goo.gl/XJNu8Rj6P4Q9AgY88", intro: "芬蘭首都歷史最悠久、最具標誌性的廣場，也是當地政治、宗教與文化中心。廣場以白色震撼的赫爾辛基座堂為中心，四周環繞著新古典主義風格建築，包括政府宮、赫爾辛基大學主樓等，這片優雅的廣場由建築師卡爾·恩格爾設計。" },
          { name: "頌歌中央圖書館 Oodi", icon: "📚", nav: "https://maps.app.goo.gl/hYQr7z7ZiB4HnBmV9", intro: "頌歌中央圖書館(Oodi)於2018年底啟用，由芬蘭 ALA Architects 設計，外觀採用自然木材與玻璃的流線型設計，像一艘巨型方舟，被認為是北歐最美圖書館之一，作為慶祝獨立百年的文化地標，被譽為「21世紀圖書館典範」。這座建築以流線型木質結構設計，顛覆傳統，融合了咖啡廳、電影院、工作坊、圖書天堂等機能。" },
          { name: "聖殿廣場教堂", icon: "🪨", nav: "https://maps.app.goo.gl/eXecVQy5u5wsCkU1A", intro: "又稱岩石教堂，建於1969年，是由Suomalainen兄弟設計的現代建築奇蹟。它直接在市中心的一整塊天然岩石中炸穴開鑿而成，外部僅見淡藍色銅製圓形屋頂，內部則保留花崗岩原貌，上方有透明玻璃自然採光，音響效果極佳，是芬蘭著名的觀光景點。" },
          { name: "靜默教堂", icon: "⛪", nav: "https://maps.app.goo.gl/9wywyhyMLoCK9DNs8", intro: "位於康比廣場，為了維護內部寧靜，入口處設有管理，並有70人的人數限制。教堂外牆使用芬蘭雲杉木，呈現光滑溫暖的橢圓形大木碗或船形結構，完全無尖銳角落，象徵平靜。這座教堂被設計為一處現代人喧囂生活中的避難所，重點在於「安靜」與「心靈療癒」。它不舉辦結婚、洗禮等傳統儀式，僅供個人祈禱或冥想。" },
          { name: "晚餐 Pho Viet 越南河粉", icon: "🍜", nav: "https://maps.app.goo.gl/t9m99uKHMPkqhofLA", intro: "一家位於芬蘭赫爾辛基的著名的越南料理餐廳，以道地、熱騰騰的越南河粉聞名，特別適合在寒冷的芬蘭天氣中享用。該餐廳提供多樣化的越南菜單，包括招牌牛肉河粉、雞絲河粉及春捲。其以新鮮食材與傳統烹飪手法著稱，是當地受歡迎的亞洲美食選擇。" },
          { name: "全世界最便宜 LV", icon: "👜", navs: [{l:"第一間", u:"https://maps.app.goo.gl/q94XBw4zmRDopnbAA"}, {l:"第二間", u:"https://maps.app.goo.gl/RTaeeug7ai7M6LRu6"}], intro: "芬蘭被譽為全世界購買Louis Vuitton最便宜的地方，主要歸因於其極高的退稅率(最高可達 17%)。雖然歐盟區定價一致，但芬蘭高額的增值稅加上便捷的退稅服務，使得退稅後的價格通常比法國更劃算。" },
          { name: "S-market 伴手禮採買", icon: "🛒", nav: "https://maps.app.goo.gl/gDTBYLw4sQoCEtMH7", intro: "1. Fazer巧克力\n被譽為「芬蘭國民巧克力」，幾乎是每個到訪芬蘭的旅客必帶的伴手禮。它的特別之處在於使用純正牛奶與高品質可可調配而成，口感濃郁滑順卻不會過於甜膩，符合北歐人喜歡的「純淨自然」風味\n2. Nordqvisit紅茶包組\n芬蘭的品牌，常有嚕嚕米的聯名，可買4種紅茶組盒(草莓味、檸檬味、野莓味、藍莓馬芬口味紅茶茶包各5包)\n3. Lumene\n創立於1970年的芬蘭國民級護膚與彩妝品牌，以北歐純淨自然為核心，主打高達99%以上的天然成分，如北極泉水、雲莓與白樺樹汁。該品牌以專利技術結合極地天然資源，專注於補水、抗氧化與提升肌膚光澤，其保濕系列(Nordic Hydra)常被譽為「平價專櫃」，適合乾燥與敏感肌，是北歐風格護膚的代表\n4. 各種糖果餅乾。" }
        ]
      },
      {
        date: "3/18", title: "塔林一日遊 🇪🇪", cities: [{n:"塔林", q:"Tallinn"}], kpArea: "赫爾辛基",
        items: [
          { name: "Luggage Room寄放行李", icon: "🎒", intro: "Bob W Kaarti一樓設有一間行李儲藏室，使用同一組密碼即可開門，裡面設有幾個附鎖的大型置物櫃。" },
          { time: "07:00", name: "從飯店出發去West Terminal 2碼頭", icon: "🚢", nav: "https://maps.app.goo.gl/i3xDFvYGf8jJHMrw5", intro: "搭乘遊輪出發前往愛沙尼亞塔林。" },
          { time: "09:00", name: "Eckero Line 郵輪出發", icon: "🚢", intro: "往返赫爾辛基與塔林的主要郵輪公司，以懸掛芬蘭國旗、主打北歐溫馨服務著稱。其主力渡輪「芬蘭迪亞號」(MS Finlandia)航程約2小時15分鐘，每日多班次運作，提供舒適的座位、自助餐、免稅商店、現場音樂演出，是往來芬蘭與愛沙尼亞高CP值的交通與觀光選擇。" },
          { name: "三姊妹建築群", icon: "🏰", nav: "https://maps.app.goo.gl/WpmpynRrji72ADfJ8", intro: "愛沙尼亞首都塔林老城最著名的中世紀建築群，建於1362年，由三座相連的商人住宅組成。這三棟具有獨立山型牆的連體建築是塔林歷史的象徵，現已改建為高檔的五星級精品酒店「The Three Sisters Boutique Hotel」，保留了古色古香的歷史底蘊與獨特的結構。" },
          { name: "聖奧拉夫教堂", icon: "⛪", nav: "https://maps.app.goo.gl/XYGwW9vUjGix5aL77", intro: "愛沙尼亞塔林舊城區，創建於12世紀，是當地著名的哥德式地標。其高聳的尖塔在16世紀曾是世界最高建築，目前仍是塔林市區最顯著的地標，也是遊客登高俯瞰塔林老城與波羅的海美景的熱門景點。" },
          { name: "塔林城牆", icon: "🧱", nav: "https://maps.app.goo.gl/7n3AWkRC5BijWJVt6", intro: "愛沙尼亞首都塔林中世紀時期(始建於1265年)的防禦工事，也是歐洲保存最完好的防禦系統之一。其環繞舊城區，以高聳的砲塔(如「偷窺廚房」)和厚實牆體聞名，展現了漢薩同盟時期的歷史面貌，是塔林躋身世界文化遺產的核心組成部分。" },
          { name: "帕特庫利觀景台", icon: "🏙️", nav: "https://maps.app.goo.gl/6PKhpdzzuJbmLwhb6", intro: "俯瞰中世紀舊城區紅色屋頂、古老城牆、塔樓及遠處波羅的海港口的絕佳位置。這座免費景點能拍到聖奧拉夫教堂的壯麗尖頂，景色與視野相較於鄰近的科赫圖奧薩觀景台更偏向港口與城牆結構，是遊客必訪的經典攝影點。" },
          { name: "kohtuotsa viewing platform", icon: "🏙️", nav: "https://maps.app.goo.gl/hX55RT9DTuGMFFCi6", intro: "必須打卡網紅牆，是俯瞰塔林舊城區紅瓦屋頂、教堂尖塔、遠眺波羅的海及現代新城區的絕佳免費觀景點。該處以其開闊的視角與著名的「The Times we had」牆面塗鴉而聞名，是遊客拍攝童話般塔林全景的必訪之處。" },
          { name: "塔林聖母主教座堂", icon: "⛪", nav: "https://maps.app.goo.gl/5KvdcpdWY1xucxt17", intro: "又稱「圓頂教堂」，位於愛沙尼亞塔林座堂山上，建於13世紀(約1219年)，是愛沙尼亞最古老且最重要的路德教派教堂。這座教堂見證了圖姆皮山丘的發展歷史，是17世紀大火後唯一的倖存建築。" },
          { name: "塔林亞歷山大·涅夫斯基主教座堂", icon: "⛪", nav: "https://maps.app.goo.gl/WGpZxF8hexYNeiBM6", intro: "愛沙尼亞最大、最高的圓頂東正教堂，位於座堂山，建於1894至1900年沙俄統治時期。這座教堂展現了典型的俄羅斯復興式風格，以深黑色洋蔥頭穹頂和金十字架為特徵，並設有11座銅鐘，內部裝飾著豐富的馬賽克圖案，是塔林老城的重要標誌。" },
          { name: "座堂山城堡", icon: "🏰", nav: "https://maps.app.goo.gl/85zxkvpwxsr4XmvP9", intro: "愛沙尼亞首都塔林的心臟地帶，座落於石灰岩山頂，自 13 世紀起即是統治權力的象徵，現為愛沙尼亞國會所在地。這座歷史古蹟擁有粉紅色巴洛克式外觀，並保留了高聳的赫爾曼塔，是研究波羅的海中世紀歷史與權力轉移的重要地標。" },
          { name: "赫爾曼塔", icon: "🏰", nav: "https://maps.app.goo.gl/H11Dd55ehoNwfCEq5", intro: "位於座堂山城堡的標誌性中世紀防禦塔，始建於14世紀(1360-1370年)，後於16世紀重建。這座高46公尺的方形石塔緊鄰愛沙尼亞國會大樓，象徵國家主權，塔頂長期飄揚著愛沙尼亞國旗。它曾在多次戰火中屹立不倒，是愛沙尼亞獨立的象徵。" },
          { name: "丹麥國王花園", icon: "🌹", nav: "https://maps.app.goo.gl/D1X5NPNB4SpobKEb8", intro: "位於愛沙尼亞首都塔林舊城區，是這座中世紀古城最具傳奇色彩的地點之一。相傳丹麥國王瓦爾德馬二世(Valdemar II)在1219年攻打愛沙尼亞異教徒時曾陷入苦戰，天空中突然降下一面紅底白十字的旗幟，並伴隨著「抓緊這面旗幟就是勝利」的聲音。隨後丹麥軍隊受此鼓舞而獲勝，這面旗幟便成為了丹麥的國旗，據信是「世界上第一面國旗」\n花園內有三座巨大的神秘「無臉僧侶」雕像，這是在2011年設計競賽中獲勝的作品，雕像分別名為「守護」、「祈求」與「給予」，旨在體現中世紀的神秘氛圍。" },
          { name: "聖尼古拉教堂", icon: "⛪", nav: "https://maps.app.goo.gl/CQA91mJ8jJHoYk1kUA", intro: "一座始建於 13 世紀的哥德式中世紀教堂，位於愛沙尼亞塔林老城。二戰後重建，現為愛沙尼亞藝術博物館分館與音樂廳，收藏著名的《死亡之舞》等中世紀宗教藝術品，並因其音樂廳功能及欣賞老城美景的塔樓而聞名。" },
          { name: "塔林市政廳", icon: "🏛️", nav: "https://maps.app.goo.gl/HTWt4gbmwpWmeUpHA", intro: "北歐唯一的哥德式市政廳，也是斯堪地那維亞和波羅的海國家最古老的市政廳(建立於1402-1404年)。這座兩層高的石造建築是塔林歷史的核心，其獨特之處在於屋頂簷邊有一對獨特的龍形排水口，傳說這三條古老的龍守護著塔林數百年。這些龍頭排水口與頂部的「守護者托馬斯」風向標共同構成了該建築的經典標誌。" },
          { name: "午餐地窖餐廳 III Draakon", icon: "🍲", nav: "https://maps.app.goo.gl/cEEhU81P7fALZpXS9", intro: "傳說在愛沙尼亞有三條龍在守護著塔林，這間店的名字就是取自愛沙尼亞語中的“三條龍”，據說店內的麋鹿湯維持跟 500 年前相同的食譜配方，服務生穿著中世紀服裝，店內還能看到有趣的店規。坐下來品嚐麋鹿湯、蘋果派等特色食物。" },
          { name: "聖凱瑟琳通道", icon: "🧱", nav: "https://maps.app.goo.gl/yizg1yv47Qj49Mpv5", intro: "愛沙尼亞塔林老城區最浪漫、最具中世紀風情的窄巷，這條以石牆堆砌的巷弄擁有獨特的跨拱建築，展示著古老的聖凱瑟琳修道院遺跡與中世紀墓碑，如今聚集了許多傳統手工藝作坊與咖啡廳，是體驗中世紀氛圍的熱門拍照景點。" },
          { name: "維魯門", icon: "🧱", nav: "https://maps.app.goo.gl/ugfsk3BfTHSPcgPT8", intro: "愛沙尼亞塔林舊城區最具代表性的中世紀入口，由兩座建於 14 世紀的常春藤覆蓋石塔組成。這座古老的城門連接現代化市區與充滿童話氛圍的舊城，是遊客進入舊城主要購物街的起點，也是著名的熱門拍照點與觀光地標。" },
          { time: "17:15", name: "A-terminal 碼頭", icon: "🚢", nav: "https://maps.app.goo.gl/jzpF5cKAPYjMQVR26", intro: "搭乘遊輪返回芬蘭赫爾辛基。" },
          { time: "18:30", name: "郵輪回程赫爾辛基", icon: "🚢", intro: "回程郵輪，休息片刻，21:00抵達芬蘭赫爾辛基。" },
          { name: "Luggage Room拿行李", icon: "🎒", nav: "https://maps.app.goo.gl/LrHxxTSFzfS9AiEbA", intro: "Bob W Kaarti一樓拿行李。" },
          { name: "交通教學：前往機場", icon: "🚌", type: "guide", transport: "於中央車站搭乘火車 P/I 線前往機場，車程30分。", intro: "準備回國之旅。" }

        date: "3/19", title: "返程 Day 1 ✈️", cities: [{n:"赫爾辛基", q:"Helsinki"}, {n:"哥本哈根", q:"Copenhagen"}], kpArea: "赫爾辛基",
        items: [
          { time: "06:15", name: "SK1705 赫爾辛基 ✈️ 哥本哈根", icon: "✈️", type: "flight", intro: "抵達哥本哈根 T3。必買特色伴手禮包括皇家哥本哈根名瓷 (Royal Copenhagen)：經典的丹麥藍色唐草瓷器、Jacobsens印有安徒生童話的丹麥奶油酥餅/餅乾、Summerbird丹麥手工巧克力。", detail: "06:15出發 → 07:05抵達 CPH T3。" }
        ]
      },
      {
        date: "3/20", title: "返程 Day 2 🇹🇼", cities: [{n:"哥本哈根", q:"Copenhagen"}, {n:"阿布達比", q:"Abu+Dhabi"}, {n:"桃園", q:"Taoyuan"}], kpArea: "桃園",
        items: [
          { time: "10:00", name: "EY178 哥本哈根 ✈️ 阿布達比", icon: "✈️", type: "flight", transport: "從第3航廈到第2航廈：步行約10分鐘即可抵達。", intro: "抵達阿布達比 A 航廈。轉機推薦購買 Bateel 椰棗與駱駝奶巧克力。", detail: "10:00出發 → AUH 19:30抵達 (A航廈)。" },
          { time: "20:55", name: "EY898 阿布達比 ✈️ 桃園", icon: "✈️", type: "flight", intro: "08:30 抵達桃園 T2。", detail: "20:55出發 → 08:30抵達 TPE。" }
        ]
      }
    ];

    function App() {
      const [view, setView] = useState('cover');
      const [day, setDay] = useState(0);
      const [records, setRecords] = useState([]);
      const [modal, setModal] = useState(null);

      const [rate, setRate] = useState(35.5);
      const [kpValue, setKpValue] = useState('—');

      const [item, setItem] = useState('');
      const [amt, setAmt] = useState('');
      const [pay, setPay] = useState('💶現金');
      const [curr, setCurr] = useState('EUR');

      const [hideUI, setHideUI] = useState(false);

      const headerRef = useRef(null);
      const bottomRef = useRef(null);
      const mainRef = useRef(null);

      const [headerH, setHeaderH] = useState(150);
      const [bottomH, setBottomH] = useState(140);

      const currDay = ITINERARY[day];

      // ✅ KPI 顯示：對應「天氣按鈕」最後一個城市名稱
      const lastCityName = (currDay?.cities && currDay.cities.length)
        ? currDay.cities[currDay.cities.length - 1].n
        : (currDay?.kpArea || "目前地點");

      // ✅ 匯率：只抓一次
      useEffect(() => {
        fetch('https://api.exchangerate-api.com/v4/latest/EUR')
          .then(res => res.json())
          .then(data => {
            const r = Number((data?.rates?.TWD ?? 35.5)) + 0.65;
            setRate(Number(r.toFixed(2)));
          })
          .catch(() => setRate(35.5));
      }, []);

      // ✅ KP：抓 NOAA 最新值（5秒更新），切換 day 也會立刻刷新
      useEffect(() => {
        let alive = true;

        const fetchKp = async () => {
          try {
            const res = await fetch("https://services.swpc.noaa.gov/json/planetary_k_index_1m.json", { cache: "no-store" });
            const data = await res.json();
            const last = data && data.length ? data[data.length - 1] : null;
            const kp = last?.kp_index;

            if (!alive) return;
            if (kp !== undefined && kp !== null && !Number.isNaN(Number(kp))) {
              setKpValue(Number(kp).toFixed(1));
            } else {
              setKpValue('—');
            }
          } catch (e) {
            // 失敗就不亂跳
          }
        };

        fetchKp();
        const timer = setInterval(fetchKp, 5000);

        return () => {
          alive = false;
          clearInterval(timer);
        };
      }, [day]);

      const addRec = () => {
        if(!item || !amt) return;
        const amount = Number(amt);
        if (!Number.isFinite(amount)) return;

        const twdVal = (curr === 'EUR') ? (amount * Number(rate)) : amount;
        const r = { id: Date.now(), item, amt: amount, pay, curr, twd: twdVal };

        setRecords([r, ...records]);
        setItem('');
        setAmt('');
      };

      // ✅ 量測 Header / Bottom 高度（讓收起後「中間真的變大」）
      useLayoutEffect(() => {
        const measure = () => {
          if (headerRef.current) setHeaderH(Math.max(120, headerRef.current.getBoundingClientRect().height));
          if (bottomRef.current) setBottomH(Math.max(110, bottomRef.current.getBoundingClientRect().height));
        };
        measure();
        window.addEventListener('resize', measure);
        return () => window.removeEventListener('resize', measure);
      }, [view, day, records.length]);

      // ✅ Scroll：下滑收起，上滑顯示
      useEffect(() => {
        const el = mainRef.current;
        if (!el) return;

        let lastTop = el.scrollTop || 0;
        let ticking = false;

        const onScroll = () => {
          const top = el.scrollTop || 0;
          const delta = top - lastTop;

          if (ticking) return;
          ticking = true;

          requestAnimationFrame(() => {
            // 下滑：收起（要滑一定距離才收）
            if (delta > 10 && top > 60) setHideUI(true);
            // 上滑：展開
            if (delta < -10) setHideUI(false);

            lastTop = top;
            ticking = false;
          });
        };

        el.addEventListener('scroll', onScroll, { passive: true });
        return () => el.removeEventListener('scroll', onScroll);
      }, [view, day]);

      // ✅ lucide icons 重繪（切換 view / day / 記帳新增刪除）
      useEffect(() => {
        const t = setTimeout(() => {
          try { lucide.createIcons(); } catch(e) {}
        }, 60);
        return () => clearTimeout(t);
      }, [view, day, records.length]);

      if (view === 'cover') return (
        <div className="h-full w-full relative flex items-center justify-center text-white overflow-hidden">
          <img src="芬蘭.jpg" className="absolute inset-0 w-full h-full object-cover" />
          <div className="absolute inset-0 bg-black/40" />
          <div className="z-10 text-center px-4">
            <h1 className="text-4xl mb-12 tracking-widest leading-relaxed font-black">
              2026/03/10~03/20<br/>芬蘭極光之旅
            </h1>
            <button
              onClick={() => setView('itinerary')}
              className="bg-sky-400 text-white px-12 py-4 rounded-full text-2xl font-black btn-cute shadow-2xl"
            >
              🐾 開始旅程
            </button>
          </div>
        </div>
      );

      // ✅ Header：absolute（不佔版面，收起中間才會變大）
      // ✅ Main：用 paddingTop / paddingBottom 預留空間
      const headerPad = hideUI ? 16 : headerH;
      const bottomPad = hideUI ? 16 : bottomH;

      return (
        <div className="w-full h-full flex flex-col bg-slate-50 relative overflow-hidden">
          {/* Header */}
          <div
            ref={headerRef}
            className={`absolute top-0 left-0 right-0 z-50 p-6 glass border-b flex justify-between items-center overflow-x-hidden ui-slide ${hideUI ? 'ui-hide' : ''}`}
          >
            <div className="min-w-0">
              <h2 className="text-4xl font-black text-blue-900 italic underline decoration-blue-200">
                {view === 'itinerary' ? `Day ${day+1}` :
                 view === 'budget' ? '記帳本' :
                 view === 'notice' ? '注意事項' : '退稅攻略'}
              </h2>
              <p className="text-lg text-gray-400 font-black mt-1">
                {view === 'itinerary' ? `${currDay.date} | ${currDay.title}` : '2026 Finland Trip'}
              </p>
            </div>

            {view === 'itinerary' && (
              <div className="text-right space-y-3 shrink-0">
                {currDay.cities.map(c => (
                  <button
                    key={c.n}
                    onClick={() => window.open(`https://www.google.com/search?q=${c.q}+weather`)}
                    className="block text-lg bg-sky-50 text-sky-600 px-4 py-2 rounded-full border border-sky-100 font-black italic underline"
                  >
                    🌤️ {c.n}
                  </button>
                ))}
              </div>
            )}
          </div>

          {/* Main Content */}
          <div
            ref={mainRef}
            className="flex-1 overflow-y-auto p-4 overflow-x-hidden"
            style={{
              paddingTop: `${headerPad}px`,
              paddingBottom: `${bottomPad}px`,
            }}
          >
            {view === 'itinerary' && (
              <div className="space-y-6">
                {currDay.reminders && (
                  <div className="bg-sky-100 text-sky-900 p-8 rounded-[45px] shadow-sm border-2 border-sky-200 overflow-x-hidden">
                    <h3 className="text-2xl font-black mb-3 flex items-center gap-2">📌 行前提醒</h3>
                    {currDay.reminders.map((r, ri) => (
                      <p key={ri} className="text-xl font-black italic opacity-90 leading-relaxed mb-1">・{r}</p>
                    ))}
                  </div>
                )}

                {/* ✅ 行程卡片：標題完整；導航在標題下一行右側 */}
                {currDay.items.map((it, i) => (
                  <div key={i} className="item-card overflow-x-hidden">
                    {it.time && (
                      <div className="text-blue-500 font-black text-4xl mb-4 italic underline decoration-sky-100 underline-offset-8">
                        {it.time}
                      </div>
                    )}

                    <div className="flex items-start gap-4">
                      <div className="shrink-0 text-4xl leading-none" aria-hidden="true">{it.icon}</div>

                      <div className="flex-1 min-w-0">
                        <div
                          onClick={() => setModal(it)}
                          className="text-3xl font-black text-slate-700 cursor-pointer leading-snug break-words"
                        >
                          {it.name && it.name.includes("住宿") && (
                            <span className="bg-pink-100 text-pink-600 px-3 py-1 rounded-2xl mr-2 italic text-2xl">住宿</span>
                          )}
                          {it.name}
                        </div>

                        {(it.nav || (it.navs && it.navs.length)) && (
                          <div className="mt-4 flex justify-end gap-3 flex-wrap">
                            {it.nav && (
                              <button
                                onClick={() => window.open(it.nav)}
                                className="bg-blue-500 text-white px-6 py-3 rounded-2xl text-2xl font-black btn-cute italic whitespace-nowrap flex items-center justify-center gap-2"
                              >
                                <span aria-hidden="true">📍</span><span>導航</span>
                              </button>
                            )}
                            {it.navs && it.navs.map((n, ni) => (
                              <button
                                key={ni}
                                onClick={() => window.open(n.u)}
                                className="bg-blue-500 text-white px-6 py-3 rounded-2xl text-2xl font-black btn-cute italic whitespace-nowrap flex items-center justify-center gap-2"
                              >
                                <span aria-hidden="true">📍</span><span>{n.l}</span>
                              </button>
                            ))}
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                ))}

                {/* ✅ 上/下一天（整體更小一點） */}
                <div className="flex justify-between mt-10 mb-6 px-2">
                  {day > 0
                    ? <button onClick={() => setDay(day-1)} className="bg-white px-8 py-4 rounded-3xl border btn-cute font-black text-xl italic">← 上一天</button>
                    : <div/>
                  }

                  {day < ITINERARY.length-1
                    ? <button onClick={() => setDay(day+1)} className="bg-blue-600 text-white px-8 py-4 rounded-3xl btn-cute font-black text-xl italic">下一天 →</button>
                    : <button onClick={() => setDay(0)} className="bg-green-500 text-white px-8 py-4 rounded-3xl btn-cute font-black text-xl italic">🔄 重啟</button>
                  }
                </div>
              </div>
            )}

            {view === 'budget' && (
              <div className="space-y-6 overflow-x-hidden">
                <div className="bg-white p-8 rounded-[50px] shadow-xl border-4 border-blue-50 overflow-x-hidden">
                  <h3 className="text-3xl font-black text-blue-800 mb-8 italic underline">💰 記帳</h3>

                  <input
                    placeholder="內容項目"
                    className="w-full p-5 mb-4 bg-slate-50 rounded-3xl font-black text-3xl border border-slate-100 outline-none min-w-0"
                    value={item}
                    onChange={e=>setItem(e.target.value)}
                  />

                  <div className="flex gap-4 mb-4">
                    <input
                      type="number"
                      placeholder="金額"
                      className="w-1/2 min-w-0 p-5 bg-slate-50 rounded-3xl font-black text-3xl border border-slate-100 outline-none"
                      value={amt}
                      onChange={e=>setAmt(e.target.value)}
                    />
                    <select
                      className="w-1/2 min-w-0 bg-slate-100 rounded-3xl px-4 font-black text-blue-600 text-3xl outline-none"
                      value={curr}
                      onChange={e=>setCurr(e.target.value)}
                    >
                      <option value="EUR">€ EUR</option>
                      <option value="TWD">NT$ TWD</option>
                    </select>
                  </div>

                  <select
                    className="w-full p-5 mb-8 bg-slate-50 rounded-3xl font-black text-2xl outline-none border border-slate-100 min-w-0"
                    value={pay}
                    onChange={e=>setPay(e.target.value)}
                  >
                    <option value="💶現金">💶現金</option>
                    <option value="💳星展ECO永續卡">💳星展ECO永續卡</option>
                    <option value="💳台新Richart卡">💳台新Richart卡</option>
                  </select>

                  <button onClick={addRec} className="w-full bg-blue-600 text-white py-6 rounded-3xl font-black text-4xl btn-cute shadow-lg">
                    存入帳本
                  </button>
                </div>

                {/* ✅ 記帳卡片：支付方式第一行；金額+垃圾桶第二行 */}
                {records.map(r => (
                  <div key={r.id} className="bg-white p-7 rounded-[45px] shadow-md border-l-[20px] border-blue-400 overflow-x-hidden">
                    <div className="font-black text-slate-800 text-3xl break-words">{r.item}</div>

                    <div className="mt-2 text-xl text-gray-400 font-black italic break-words whitespace-normal">
                      {r.pay}
                    </div>

                    <div className="mt-5 flex items-center justify-between gap-4">
                      <div className="min-w-0">
                        <div className="font-black text-blue-600 italic text-4xl tracking-tighter">
                          NT$ {Math.round(Number(r.twd) || 0).toLocaleString()}
                        </div>
                        <div className="text-xl text-gray-300 font-black italic">
                          {r.curr==='EUR' ? '€' : '$'}{r.amt}
                        </div>
                      </div>

                      <button
                        onClick={()=>setRecords(records.filter(x=>x.id!==r.id))}
                        className="shrink-0 w-12 h-12 rounded-2xl flex items-center justify-center bg-red-50 text-red-400 text-2xl active:scale-95 active:bg-red-100"
                        aria-label="刪除"
                        title="刪除"
                      >
                        🗑️
                      </button>
                    </div>
                  </div>
                ))}

                {/* ✅ 總金額：縮小、一行顯示 NT$XXXX */}
                <div className="bg-blue-900 text-white p-7 rounded-[40px] shadow-2xl mt-8 overflow-x-hidden">
                  <div className="flex items-center justify-between gap-4 flex-wrap">
                    <div className="text-base opacity-70 font-black italic">匯率預估: {rate}</div>
                    <div className="text-2xl font-black italic underline decoration-sky-400 underline-offset-4">總計</div>
                    <div className="text-3xl font-black tracking-tight whitespace-nowrap">
                      NT$ {Math.round(records.reduce((s,r)=>s + (Number(r.twd) || 0), 0)).toLocaleString()}
                    </div>
                  </div>
                </div>
              </div>
            )}

            {view === 'notice' && (
              <div className="space-y-8 px-2 overflow-x-hidden">
                <div className="info-card">
                  <h4 className="text-3xl font-black text-blue-600 mb-4 underline decoration-blue-100">⚡ 1. 電壓與插頭</h4>
                  <p className="text-2xl font-black italic leading-loose text-slate-700">芬蘭的電壓是220-240V，插頭屬於兩腳圓型，要記得帶轉接插頭。</p>
                </div>
                <div className="info-card">
                  <h4 className="text-3xl font-black text-blue-600 mb-4 underline decoration-blue-100">💧 2. 飲用水</h4>
                  <p className="text-2xl font-black italic leading-loose text-slate-700">水龍頭的水可直接飲用，餐廳通常提供免費的水。</p>
                </div>
                <div className="info-card">
                  <h4 className="text-3xl font-black text-blue-600 mb-4 underline decoration-blue-100">⏰ 3. 時差</h4>
                  <p className="text-2xl font-black italic leading-loose text-slate-700">芬蘭冬季慢台灣6小時。</p>
                </div>
                <div className="info-card border-l-red-400">
                  <h4 className="text-3xl font-black text-red-600 mb-4 underline decoration-red-100">🆘 4. 緊急電話</h4>
                  <p className="text-2xl font-black italic leading-loose text-slate-700">緊急求助電話為 112。</p>
                </div>
                <div className="info-card">
                  <h4 className="text-3xl font-black text-blue-600 mb-4 underline decoration-blue-100">💶 5. 貨幣與歐元</h4>
                  <p className="text-xl font-black italic leading-loose text-slate-700">芬蘭是北歐國家中唯一使用歐元的國家，愛沙尼亞也是使用歐元。</p>
                  <p className="text-lg text-slate-400 font-black italic mt-2">(瑞典、丹麥、挪威和冰島都是用自己國家的克朗)</p>
                </div>
              </div>
            )}

            {view === 'tax' && (
              <div className="space-y-8 px-2 overflow-x-hidden">
                <div className="info-card border-l-red-400">
                  <h4 className="text-3xl font-black text-red-600 mb-4">📝 1. 索取稅單</h4>
                  <p className="text-2xl font-black italic leading-loose text-slate-700">
                    購物需主動向店員索取退稅單，務必檢查國籍(台灣的ISO標準國家代碼是158)、姓名、品項、退稅金額是否正確
                  </p>
                </div>

                <div className="info-card border-l-blue-400">
                  <h4 className="text-3xl font-black text-blue-600 mb-4">💰 2. 退稅門檻</h4>
                  <p className="text-2xl font-black italic leading-loose text-slate-700">
                    建議湊到40歐元退稅門檻，並在機場辦理退稅(建議退信用卡)
                  </p>
                </div>

                <div className="bg-red-50 p-8 rounded-[50px] border-4 border-red-100 shadow-sm overflow-x-hidden">
                  <h4 className="text-3xl font-black text-red-600 mb-5 flex items-center gap-2 italic underline">⚠️ 3. 注意</h4>
                  <p className="text-2xl font-black italic leading-relaxed text-red-800">
                    托運行李→芬蘭辦理<br/>
                    手提行李→丹麥辦理
                  </p>
                </div>

                <div className="info-card border-l-orange-400">
                  <h4 className="text-3xl font-black text-orange-600 mb-4">🧳 4. 托運行李 (芬蘭)</h4>
                  <p className="text-2xl font-black italic leading-loose text-slate-700">
                    24小時開放的Customs Export Clearance service point位於抵達大廳(Arrivals hall) 附近，取得並填寫好退稅單，若無人在場可使用櫃檯電話聯繫海關蓋章。海關查驗護照、機票及未拆封商品後會蓋章
                  </p>
                </div>

                <div className="info-card border-l-orange-400">
                  <h4 className="text-3xl font-black text-orange-600 mb-4">📪 5. 投遞退稅單</h4>
                  <p className="text-2xl font-black italic leading-loose text-slate-700 mb-6">
                    過安檢後，在13、29、50號登機口找到Global Blue Tax Free Refund Box，退稅信封在信箱左右側，將蓋過海關章退稅單放入信封後投入信箱
                  </p>
                  <p className="bg-yellow-50 p-6 rounded-3xl text-red-600 text-2xl font-black italic border-2 border-yellow-100 shadow-inner">
                    建議投遞前，將稅單與退稅程序完整錄影或拍照存證
                  </p>
                </div>

                <div className="info-card border-l-orange-400">
                  <h4 className="text-3xl font-black text-orange-600 mb-4">🎒 6. 手提行李 (丹麥)</h4>
                  <p className="text-2xl font-black italic leading-loose text-slate-700">
                    丹麥哥本哈根機場T3跟T2中間的聯通道，約在7-11旁會看到Global Blue的櫃檯，可以處理Global Blue的稅單，若人員不在，可以自行在機器退稅
                  </p>
                </div>
              </div>
            )}
          </div>

          {/* Bottom Nav */}
          <div
            ref={bottomRef}
            className={`absolute bottom-0 left-0 right-0 z-40 overflow-x-hidden ui-slide ${hideUI ? 'bottom-hide' : ''}`}
          >
            {/* ✅ KP：城市名字（對應天氣最後一個城市）＋ NOAA KP；字小；不擋上一天下一天 */}
            {view === 'itinerary' && (
              <div className="px-4 pt-3 pb-2">
                <button
                  onClick={() => window.open(`https://www.swpc.noaa.gov/products/aurora-30-minute-forecast`)}
                  className="w-full bg-blue-800 text-white py-3 text-sm font-black italic tracking-widest flex items-center justify-center gap-2 rounded-2xl shadow-xl border border-blue-700/30"
                  title="點擊查看 NOAA 極光預測"
                >
                  🌌 今日 {lastCityName} 極光 KP 值:
                  <span className="text-green-300 text-sm">{kpValue}</span>
                </button>
              </div>
            )}

            <div className="h-28 glass border-t flex justify-around items-center px-4 safe-bottom">
              <button onClick={()=>setView('itinerary')} className={`flex flex-col items-center gap-1 ${view==='itinerary'?'text-blue-600 scale-125 font-black italic':'text-slate-300'}`}>
                <i data-lucide="calendar" size={32}></i><span className="text-base font-black">行程</span>
              </button>
              <button onClick={()=>setView('budget')} className={`flex flex-col items-center gap-1 ${view==='budget'?'text-blue-600 scale-125 font-black italic':'text-slate-300'}`}>
                <i data-lucide="piggy-bank" size={32}></i><span className="text-base font-black">記帳</span>
              </button>
              <button onClick={()=>setView('notice')} className={`flex flex-col items-center gap-1 ${view==='notice'?'text-blue-600 scale-125 font-black italic':'text-slate-300'}`}>
                <i data-lucide="info" size={32}></i><span className="text-base font-black">注意</span>
              </button>
              <button onClick={()=>setView('tax')} className={`flex flex-col items-center gap-1 ${view==='tax'?'text-blue-600 scale-125 font-black italic':'text-slate-300'}`}>
                <i data-lucide="receipt" size={32}></i><span className="text-base font-black">退稅</span>
              </button>
            </div>
          </div>

          {/* ✅ Modal：CLOSE 永遠存在 + 內容底部不被擋 */}
          {modal && (
            <div className="modal-wrap" onClick={()=>setModal(null)}>
              <div className="modal-card" onClick={e=>e.stopPropagation()}>
                <h3 className="text-4xl font-black mb-6 text-blue-900 italic underline decoration-yellow-200 underline-offset-8 leading-snug break-words">
                  {modal.name}
                </h3>

                <div className="modal-body intro-scroll text-slate-600">
                  {modal.transport && (
                    <div className="p-6 bg-sky-50 rounded-[40px] border-4 border-sky-100 text-sky-800 text-2xl font-black italic leading-relaxed break-words mb-6">
                      💡 教學：<br/>{modal.transport}
                    </div>
                  )}
                  {modal.detail && (
                    <div className="text-xl font-black text-slate-400 border-b-4 pb-4 italic uppercase tracking-widest leading-loose break-words mb-6">
                      詳情：<br/>{modal.detail}
                    </div>
                  )}
                  <p className="font-black italic whitespace-pre-wrap leading-loose break-words">{modal.intro}</p>
                </div>

                <button
                  onClick={() => setModal(null)}
                  className="mt-6 w-full py-5 bg-slate-100 rounded-[32px] font-black text-slate-500 uppercase btn-cute text-3xl italic"
                >
                  CLOSE
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
    setTimeout(() => { try { lucide.createIcons(); } catch(e) {} }, 120);
  </script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
