  <style>
    @font-face {
      font-family: 'TripFont';

    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    :root { font-size: 22px; }

    body {
      margin: 0;
      padding: 0;
      font-family: 'TripFont', sans-serif;
      background: #eef2ff;
      user-select: none;
      line-height: 1.8;
      color: #1e293b;

    }

    #root { height: 100%; }
    #root > * { height: 100%; }

    .app-outer{
      min-height: 100vh;
      display:flex;
      justify-content:center;
      align-items:stretch;
      padding: 0;
      background: radial-gradient(1200px 600px at 50% 0%, #dbeafe 0%, #eef2ff 55%, #f8fafc 100%);

    @supports (height: 100dvh){
      .app-outer{ min-height: 100dvh; }
    }

    .app-shell{
      width: 100%;
      max-width: 460px;
      height: 100vh;
      background: #ffffff;
      position: relative;
      overflow: hidden;
    }
    @supports (height: 100dvh){
      .app-shell{ height: 100dvh; }
    }

    .glass { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(15px); }
    .btn-cute { transition: all 0.2s; box-shadow: 0 5px 0 #93c5fd; border: 2px solid #bfdbfe; }
    .btn-cute:active { transform: translateY(3px); box-shadow: 0 2px 0 #93c5fd; }

    .intro-scroll {
      font-size: 1.5rem;
      line-height: 2.3;
      font-weight: bold;
      overflow-y: auto;
      max-height: 58vh;
      padding-right: 10px;
      overflow-x: hidden;
      word-break: break-word;
      padding-bottom: 24px;
      -webkit-overflow-scrolling: touch;
    }
    .item-card { background: white; border-radius: 40px; padding: 1.8rem; margin-bottom: 1.5rem; border: 2px solid #f1f5f9; }
    .info-card {
      background: white;
      border-radius: 40px;
      padding: 1.8rem;
      border-left: 14px solid #3b82f6;
      margin-bottom: 2rem;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
      overflow-x: hidden;
      word-break: break-word;
    }
    .intro-scroll::-webkit-scrollbar { width: 4px; }
    .intro-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }

    .ui-slide { transition: transform .18s ease, opacity .18s ease; will-change: transform; }
    .ui-hide { transform: translateY(-110%); opacity: 0; pointer-events: none; }
    .bottom-hide { transform: translateY(110%); opacity: 0; pointer-events: none; }

    .safe-bottom{
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 0.75rem);
    }

    .modal-wrap{
      position:absolute; inset:0;
      z-index: 60;
      background: rgba(0,0,0,0.7);
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 16px;
    }
    .modal-card{
      background:#fff;
      width: 100%;
      max-width: 96%;
      border-radius: 55px;
      padding: 32px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.25);
      display:flex;
      flex-direction:column;
      max-height: 86%;
      overflow:hidden;
    }
    .modal-body{
      overflow-y:auto;
      overflow-x:hidden;
      padding-right: 10px;
      padding-bottom: 14px;
      -webkit-overflow-scrolling: touch;
      word-break: break-word;
    }
  </style>
</head>

    function uniqCities(list){
      const seen = new Set();
      const out = [];
      (list || []).forEach(c => {
        const key = (c && c.n) ? c.n : JSON.stringify(c);
        if (!seen.has(key)) { seen.add(key); out.push(c); }
      });
      return out;
    }

    function App() {
      const [view, setView] = useState('cover');
      const [day, setDay] = useState(0);
      const [records, setRecords] = useState([]);
      const [modal, setModal] = useState(null);

      const [rate, setRate] = useState(35.5);
      const [kpValue, setKpValue] = useState('—');

      const [item, setItem] = useState('');
      const [amt, setAmt] = useState('');
      const [pay, setPay] = useState('💶現金');
      const [curr, setCurr] = useState('EUR');

      const [hideUI, setHideUI] = useState(false);

      const [noticeTab, setNoticeTab] = useState('seoul'); // seoul | finland
      const [taxTab, setTaxTab] = useState('seoul'); // seoul | finland

      const headerRef = useRef(null);
      const bottomRef = useRef(null);
      const mainRef = useRef(null);

      const [headerH, setHeaderH] = useState(150);
      const [bottomH, setBottomH] = useState(140);

      const currDay = ITINERARY[day];

      const lastCityName = (currDay?.kpArea)
        ? currDay.kpArea
        : ((currDay?.weatherCities && currDay.weatherCities.length)
            ? currDay.weatherCities[currDay.weatherCities.length - 1].n
            : "目前地點");

      const weatherList = useMemo(() => {
        if (currDay?.weatherCities && currDay.weatherCities.length) return uniqCities(currDay.weatherCities);
        return [];
      }, [day]);

      useEffect(() => {
        fetch('https://api.exchangerate-api.com/v4/latest/EUR')
          .then(res => res.json())
          .then(data => {
            const r = Number((data?.rates?.TWD ?? 35.5)) + 0.65;
            setRate(Number(r.toFixed(2)));
          })
          .catch(() => setRate(35.5));
      }, []);

      useEffect(() => {
        let alive = true;

        const fetchKp = async () => {
          try {
            const res = await fetch("https://services.swpc.noaa.gov/json/planetary_k_index_1m.json", { cache: "no-store" });
            const data = await res.json();
            const last = data && data.length ? data[data.length - 1] : null;
            const kp = last?.kp_index;

            if (!alive) return;
            if (kp !== undefined && kp !== null && !Number.isNaN(Number(kp))) {
              setKpValue(Number(kp).toFixed(1));
            } else {
              setKpValue('—');
            }
          } catch (e) {}
        };

        fetchKp();
        const timer = setInterval(fetchKp, 5000);

        return () => {
          alive = false;
          clearInterval(timer);
        };
      }, [day]);

      const addRec = () => {
        if(!item || !amt) return;
        const amount = Number(amt);
        if (!Number.isFinite(amount)) return;

        const twdVal = (curr === 'EUR') ? (amount * Number(rate)) : amount;
        const r = { id: Date.now(), item, amt: amount, pay, curr, twd: twdVal };

        setRecords([r, ...records]);
        setItem('');
        setAmt('');
      };

      useLayoutEffect(() => {
        const headerEl = headerRef.current;
        const bottomEl = bottomRef.current;
        if (!headerEl || !bottomEl) return;

        const ro = new ResizeObserver(() => {
          const h = headerEl.getBoundingClientRect().height || 0;
          const b = bottomEl.getBoundingClientRect().height || 0;
          setHeaderH(Math.max(120, Math.round(h)));
          setBottomH(Math.max(110, Math.round(b)));
        });

        ro.observe(headerEl);
        ro.observe(bottomEl);

        const h0 = headerEl.getBoundingClientRect().height || 0;
        const b0 = bottomEl.getBoundingClientRect().height || 0;
        setHeaderH(Math.max(120, Math.round(h0)));
        setBottomH(Math.max(110, Math.round(b0)));

        return () => ro.disconnect();
      }, [view, day, records.length]);

      // ✅ 改：不管往上/往下，只要離開頂部區域就隱藏；回到頂部區域才顯示（避免跳動/卡）
      useEffect(() => {
        const el = mainRef.current;
        if (!el) return;

        const TOP_ZONE = 44; // 在這個高度內才顯示 header/bottom

        const onScroll = () => {
          const top = el.scrollTop || 0;
          setHideUI(top > TOP_ZONE);
        };

        el.addEventListener('scroll', onScroll, { passive: true });
        onScroll();
        return () => el.removeEventListener('scroll', onScroll);
      }, [view, day]);

      useEffect(() => {
        const t = setTimeout(() => {
          try { lucide.createIcons(); } catch(e) {}
        }, 60);
        return () => clearTimeout(t);
      }, [view, day, records.length, noticeTab, taxTab]);

      if (view === 'cover') return (
        <div className="h-full w-full relative flex items-center justify-center text-white overflow-hidden">
          <img src="芬蘭.jpg" className="absolute inset-0 w-full h-full object-cover" />
          <div className="absolute inset-0 bg-black/40" />
          <div className="z-10 text-center px-4">
            <h1 className="text-4xl mb-12 tracking-widest leading-relaxed font-black">
              2026/03/10~03/20<br/>芬蘭極光之旅
            </h1>
            <button
  onClick={() => setView('itinerary')}
  className="bg-sky-400 text-white px-12 py-4 rounded-full text-2xl font-black btn-cute shadow-2xl"
>
  <span className="inline-flex items-center gap-3">
    <span className="text-blue-200">
      <i data-lucide="paw-print" size="30"></i>
    </span>
    <span>開始旅程</span>
  </span>
</button>
          </div>
        </div>
      );

      const headerPad = hideUI ? 16 : headerH;
      const bottomPad = hideUI ? 16 : bottomH;

      return (
        <div className="w-full h-full flex flex-col bg-slate-50 relative overflow-hidden">
          {/* Header */}
          <div
            ref={headerRef}
            className={`absolute top-0 left-0 right-0 z-50 p-6 glass border-b flex justify-between items-center overflow-x-hidden ui-slide ${hideUI ? 'ui-hide' : ''}`}
          >
            <div className="min-w-0">
              <h2 className="text-4xl font-black text-blue-900 italic underline decoration-blue-200">
                {view === 'itinerary' ? `Day ${day+1}` :
                 view === 'budget' ? '記帳本' :
                 view === 'notice' ? '注意事項' : '退稅攻略'}
              </h2>
              <p className="text-lg text-gray-400 font-black mt-1">
                {view === 'itinerary' ? `${currDay.date} | ${currDay.title}` : '2026 Finland Trip'}
              </p>
            </div>

            {view === 'itinerary' && (
              <div className="text-right space-y-3 shrink-0">
                {weatherList.map(c => (
                  <button
                    key={c.n}
                    onClick={() => window.open(`https://www.google.com/search?q=${c.q}+weather`)}
                    className="block text-lg bg-sky-50 text-sky-600 px-4 py-2 rounded-full border border-sky-100 font-black italic underline"
                  >
                    🌤️ {c.n}
                  </button>
                ))}
              </div>
            )}
          </div>

          {/* Main Content */}
          <div
            ref={mainRef}
            className="flex-1 overflow-y-auto p-4 overflow-x-hidden"
            style={{
              paddingTop: `${headerPad}px`,
              paddingBottom: `${bottomPad}px`,
              WebkitOverflowScrolling: 'touch'
            }}
          >
            {view === 'itinerary' && (
              <div className="space-y-6">
                {currDay.items.map((it, i) => (
                  <div key={i} className="item-card overflow-x-hidden">
                    {it.time && (
                      <div className="text-blue-500 font-black text-4xl mb-4 italic underline decoration-sky-100 underline-offset-8">
                        {it.time}
                      </div>
                    )}

                    <div className="flex items-start gap-4">
                      <div className="shrink-0 text-4xl leading-none" aria-hidden="true">{it.icon}</div>

                      <div className="flex-1 min-w-0">
                        <div
                          onClick={() => setModal(it)}
                          className="text-3xl font-black text-slate-700 cursor-pointer leading-snug break-words"
                        >
                          {it.name}
                        </div>

                        {(it.nav || (it.navs && it.navs.length)) && (
                          <div className="mt-4 flex justify-end gap-3 flex-wrap">
                            {it.nav && (
                              <button
                                onClick={() => window.open(it.nav)}
                                className="bg-blue-500 text-white px-6 py-3 rounded-2xl text-2xl font-black btn-cute italic whitespace-nowrap flex items-center justify-center gap-2"
                              >
                                <span aria-hidden="true">📍</span><span>導航</span>
                              </button>
                            )}
                            {it.navs && it.navs.map((n, ni) => (
                              <button
                                key={ni}
                                onClick={() => window.open(n.u)}
                                className="bg-blue-500 text-white px-6 py-3 rounded-2xl text-2xl font-black btn-cute italic whitespace-nowrap flex items-center justify-center gap-2"
                              >
                                <span aria-hidden="true">📍</span><span>{n.l}</span>
                              </button>
                            ))}
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                ))}

                <div className="flex justify-between items-center mt-10 mb-6 px-2 gap-3">
                  {day > 0
                    ? <button onClick={() => setDay(day-1)} className="bg-white px-6 py-4 rounded-3xl border btn-cute font-black text-lg italic whitespace-nowrap leading-none">← 上一天</button>
                    : <div/>
                  }

                  {day < ITINERARY.length-1
                    ? <button onClick={() => setDay(day+1)} className="bg-blue-600 text-white px-6 py-4 rounded-3xl btn-cute font-black text-lg italic whitespace-nowrap leading-none">下一天 →</button>
                    : <button onClick={() => setDay(0)} className="bg-green-500 text-white px-6 py-4 rounded-3xl btn-cute font-black text-lg italic whitespace-nowrap leading-none">🔄 重啟</button>
                  }
                </div>
              </div>
            )}

            {view === 'budget' && (
              <div className="space-y-6 overflow-x-hidden">
                <div className="bg-white p-8 rounded-[50px] shadow-xl border-4 border-blue-50 overflow-x-hidden">
                  <h3 className="text-3xl font-black text-blue-800 mb-8 italic underline">💰 記帳</h3>

                  <input
                    placeholder="內容項目"
                    className="w-full p-5 mb-4 bg-slate-50 rounded-3xl font-black text-3xl border border-slate-100 outline-none min-w-0"
                    value={item}
                    onChange={e=>setItem(e.target.value)}
                  />

                  <div className="flex gap-4 mb-4">
                    <input
                      type="number"
                      placeholder="金額"
                      className="w-1/2 min-w-0 p-5 bg-slate-50 rounded-3xl font-black text-3xl border border-slate-100 outline-none"
                      value={amt}
                      onChange={e=>setAmt(e.target.value)}
                    />
                    <select
                      className="w-1/2 min-w-0 bg-slate-100 rounded-3xl px-4 font-black text-blue-600 text-3xl outline-none"
                      value={curr}
                      onChange={e=>setCurr(e.target.value)}
                    >
                      <option value="EUR">€ EUR</option>
                      <option value="TWD">NT$ TWD</option>
                    </select>
                  </div>

                  <select
                    className="w-full p-5 mb-8 bg-slate-50 rounded-3xl font-black text-2xl outline-none border border-slate-100 min-w-0"
                    value={pay}
                    onChange={e=>setPay(e.target.value)}
                  >
                    <option value="💶現金">💶現金</option>
                    <option value="💳星展ECO永續卡">💳星展ECO永續卡</option>
                    <option value="💳台新Richart卡">💳台新Richart卡</option>
                  </select>

                  <button onClick={addRec} className="w-full bg-blue-600 text-white py-6 rounded-3xl font-black text-4xl btn-cute shadow-lg">
                    存入帳本
                  </button>
                </div>

                {records.map(r => (
                  <div key={r.id} className="bg-white p-7 rounded-[45px] shadow-md border-l-[20px] border-blue-400 overflow-x-hidden">
                    <div className="font-black text-slate-800 text-3xl break-words">{r.item}</div>

                    <div className="mt-2 text-xl text-gray-400 font-black italic break-words whitespace-normal">
                      {r.pay}
                    </div>

                    <div className="mt-5 flex items-center justify-between gap-4">
                      <div className="min-w-0">
                        <div className="font-black text-blue-600 italic text-4xl tracking-tighter">
                          NT$ {Math.round(Number(r.twd) || 0).toLocaleString()}
                        </div>
                        <div className="text-xl text-gray-300 font-black italic">
                          {r.curr==='EUR' ? '€' : '$'}{r.amt}
                        </div>
                      </div>

                      <button
                        onClick={()=>setRecords(records.filter(x=>x.id!==r.id))}
                        className="shrink-0 w-12 h-12 rounded-2xl flex items-center justify-center bg-red-50 text-red-400 text-2xl active:scale-95 active:bg-red-100"
                        aria-label="刪除"
                        title="刪除"
                      >
                        🗑️
                      </button>
                    </div>
                  </div>
                ))}

                <div className="bg-blue-900 text-white p-7 rounded-[40px] shadow-2xl mt-8 overflow-x-hidden">
                  <div className="flex items-center justify-between gap-4 flex-wrap">
                    <div className="text-base opacity-70 font-black italic">匯率預估: {rate}</div>
                    <div className="text-2xl font-black italic underline decoration-sky-400 underline-offset-4">總計</div>
                    <div className="text-3xl font-black tracking-tight whitespace-nowrap">
                      NT$ {Math.round(records.reduce((s,r)=>s + (Number(r.twd) || 0), 0)).toLocaleString()}
                    </div>
                  </div>
                </div>
              </div>
            )}

            {view === 'notice' && (
              <div className="space-y-6 overflow-x-hidden">
                {/* Tabs */}
                <div className="bg-white p-4 rounded-[40px] border-2 border-slate-100 flex gap-3">
                  <button
                    onClick={()=>setNoticeTab('seoul')}
                    className={`flex-1 py-3 rounded-3xl font-black text-2xl btn-cute italic ${noticeTab==='seoul' ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-500'}`}
                  >
                    🇰🇷 首爾
                  </button>
                  <button
                    onClick={()=>setNoticeTab('finland')}
                    className={`flex-1 py-3 rounded-3xl font-black text-2xl btn-cute italic ${noticeTab==='finland' ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-500'}`}
                  >
                    🇫🇮 芬蘭
                  </button>
                </div>

                {noticeTab === 'seoul' && (
                  <div className="space-y-8 px-2 overflow-x-hidden">
                    <div className="info-card">
                      <h4 className="text-3xl font-black text-blue-600 mb-4 underline decoration-blue-100">🛂 1. 電子入境卡</h4>
                      <p className="text-2xl font-black italic leading-loose text-slate-700">自2025年2月24日起，韓國正式實施「電子入境卡」制度，過韓國海關時掃描 QR code</p>
                    </div>
                    <div className="info-card">
                      <h4 className="text-3xl font-black text-blue-600 mb-4 underline decoration-blue-100">🔋 2. 行動電源規定</h4>
                      <p className="text-2xl font-black italic leading-loose text-slate-700">行動電源要有「Wh」標籤，需要貼上絕緣膠帶、個別放入塑膠/保護袋中、蓋上充電端保護蓋</p>
                    </div>
                    <div className="info-card border-l-red-400">
                      <h4 className="text-3xl font-black text-red-600 mb-4 underline decoration-red-100">🚫 3. 違禁藥品</h4>
                      <p className="text-2xl font-black italic leading-loose text-slate-700">EVE止痛藥、感冒藥等被歸類為「違禁藥品」</p>
                    </div>
                    <div className="info-card">
                      <h4 className="text-3xl font-black text-blue-600 mb-4 underline decoration-blue-100">💱 4. 換錢</h4>
                      <p className="text-2xl font-black italic leading-loose text-slate-700">部分商家僅收現金，可到弘大地鐵7號出口的Money Box換錢所兌換小額韓幣</p>
                      <div className="mt-4 flex justify-end">
                        <button
                          onClick={() => window.open("https://naver.me/xUt8tQ2a")}
                          className="bg-blue-500 text-white px-6 py-3 rounded-2xl text-2xl font-black btn-cute italic whitespace-nowrap flex items-center justify-center gap-2"
                        >
                          <span aria-hidden="true">📍</span><span>導航</span>
                        </button>
                      </div>
                    </div>
                  </div>
                )}

                {noticeTab === 'finland' && (
                  <div className="space-y-8 px-2 overflow-x-hidden">
                    <div className="info-card">
                      <h4 className="text-3xl font-black text-blue-600 mb-4 underline decoration-blue-100">⚡ 1. 電壓與插頭</h4>
                      <p className="text-2xl font-black italic leading-loose text-slate-700">芬蘭的電壓是220-240V，插頭屬於兩腳圓型，要記得帶轉接插頭</p>
                    </div>
                    <div className="info-card">
                      <h4 className="text-3xl font-black text-blue-600 mb-4 underline decoration-blue-100">💧 2. 飲用水</h4>
                      <p className="text-2xl font-black italic leading-loose text-slate-700">水龍頭的水可直接飲用，餐廳通常提供免費的水</p>
                    </div>
                    <div className="info-card">
                      <h4 className="text-3xl font-black text-blue-600 mb-4 underline decoration-blue-100">⏰ 3. 時差</h4>
                      <p className="text-2xl font-black italic leading-loose text-slate-700">芬蘭冬季慢台灣6小時</p>
                    </div>
                    <div className="info-card border-l-red-400">
                      <h4 className="text-3xl font-black text-red-600 mb-4 underline decoration-red-100">🆘 4. 緊急電話</h4>
                      <p className="text-2xl font-black italic leading-loose text-slate-700">緊急求助電話為 112</p>
                    </div>
                    <div className="info-card">
                      <h4 className="text-3xl font-black text-blue-600 mb-4 underline decoration-blue-100">💶 5. 貨幣與歐元</h4>
                      <p className="text-xl font-black italic leading-loose text-slate-700">芬蘭是北歐國家中唯一使用歐元的國家，愛沙尼亞也是使用歐元</p>
                      {/* ✅ 改回：灰字在下面 */}
                      <p className="text-lg text-slate-400 font-black italic mt-2">(瑞典、丹麥、挪威和冰島都是用自己國家的克朗)</p>
                    </div>
                  </div>
                )}
              </div>
            )}

            {view === 'tax' && (
              <div className="space-y-6 overflow-x-hidden">
                {/* Tabs */}
                <div className="bg-white p-4 rounded-[40px] border-2 border-slate-100 flex gap-3">
                  <button
                    onClick={()=>setTaxTab('seoul')}
                    className={`flex-1 py-3 rounded-3xl font-black text-2xl btn-cute italic ${taxTab==='seoul' ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-500'}`}
                  >
                    🇰🇷 首爾
                  </button>
                  <button
                    onClick={()=>setTaxTab('finland')}
                    className={`flex-1 py-3 rounded-3xl font-black text-2xl btn-cute italic ${taxTab==='finland' ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-500'}`}
                  >
                    🇫🇮 芬蘭
                  </button>
                </div>

                {taxTab === 'seoul' && (
                  <div className="space-y-8 px-2 overflow-x-hidden">
                    <div className="info-card border-l-red-400">
                      <h4 className="text-3xl font-black text-red-600 mb-4">🧾 1. 索取退稅單據</h4>
                      <p className="text-2xl font-black italic leading-loose text-slate-700">購買含稅商品15,000韓幣，向店家索取退稅單據(有TAX FREE字樣，非一般收據)</p>
                    </div>
                    <div className="info-card border-l-blue-400">
                      <h4 className="text-3xl font-black text-blue-600 mb-4">🛂 2. 出境辦理</h4>
                      <p className="text-2xl font-black italic leading-loose text-slate-700">於出境時攜帶「退稅單據」、「購物收據」和「購買的物品」(未拆封、未使用)，在海關櫃檯蓋退稅章後，於出境管制區取得退稅款</p>
                    </div>
                    <div className="info-card">
                      <h4 className="text-3xl font-black text-blue-600 mb-4">📌 3. 超過門檻</h4>
                      <p className="text-2xl font-black italic leading-loose text-slate-700">若金額超過75,000韓幣，需要到海關申報櫃檯辦理</p>
                    </div>
                    <div className="info-card">
                      <h4 className="text-3xl font-black text-blue-600 mb-4">🤖 4. 自助退稅機</h4>
                      <p className="text-2xl font-black italic leading-loose text-slate-700">若金額未達75,000韓幣，可以使用自助退稅機台辦理</p>
                    </div>
                    <div className="info-card">
                      <h4 className="text-3xl font-black text-blue-600 mb-4">🧭 5. 機台位置</h4>
                      <p className="text-2xl font-black italic leading-loose text-slate-700">在航空公司報到櫃檯編號F跟Ｈ的側邊，就可以看到退稅機，退稅機的對面，就是「海關申報」</p>
                    </div>
                    <div className="info-card border-l-red-400">
                      <h4 className="text-3xl font-black text-red-600 mb-4">❌ 6. 標記X單據</h4>
                      <p className="text-2xl font-black italic leading-loose text-slate-700">欄位標記「Ｘ」的單據，就要帶著所購買的商品(未拆封、未使用)，去對面的「海關申報」櫃檯查驗</p>
                    </div>
                    <div className="info-card">
                      <h4 className="text-3xl font-black text-blue-600 mb-4">💵 7. 取現</h4>
                      <p className="text-2xl font-black italic leading-loose text-slate-700">在249登機門的對面，就可以看到退稅取現櫃檯，可以直接使用機器拿到韓幣現鈔</p>
                    </div>
                  </div>
                )}

                {taxTab === 'finland' && (
                  <div className="space-y-8 px-2 overflow-x-hidden">
                    <div className="info-card border-l-red-400">
                      <h4 className="text-3xl font-black text-red-600 mb-4">📝 1. 索取稅單</h4>
                      <p className="text-2xl font-black italic leading-loose text-slate-700">
                        購物需主動向店員索取退稅單(務必檢查國籍(台灣的ISO標準國家代碼是158)、姓名、品項、退稅金額是否正確)
                      </p>
                    </div>

                    <div className="info-card border-l-blue-400">
                      <h4 className="text-3xl font-black text-blue-600 mb-4">💰 2. 退稅門檻</h4>
                      <p className="text-2xl font-black italic leading-loose text-slate-700">
                        建議湊到40歐元退稅門檻，並在機場辦理退稅(建議退信用卡)
                      </p>
                    </div>

                    <div className="info-card border-l-orange-400">
                      <h4 className="text-3xl font-black text-orange-600 mb-4">🧳 3. 海關蓋章</h4>
                      <p className="text-2xl font-black italic leading-loose text-slate-700">
                        24小時開放的Customs Export Clearance service point位於抵達大廳(Arrivals hall) 附近，取得並填寫好退稅單，若無人在場可使用櫃檯電話聯繫海關蓋章。海關查驗護照、機票及未拆封商品後會蓋章
                      </p>
                    </div>

                    <div className="info-card border-l-orange-400">
                      <h4 className="text-3xl font-black text-orange-600 mb-4">📪 4. 投遞退稅單</h4>
                      <p className="text-2xl font-black italic leading-loose text-slate-700">
                        過安檢後，在13、29、50號登機口找到Global Blue Tax Free Refund Box，退稅信封在信箱左右側，將蓋過海關章退稅單放入信封後投入信箱
                      </p>
                      {/* ✅ 改回：標在下面 */}
                      <p className="bg-yellow-50 p-6 rounded-3xl text-red-600 text-2xl font-black italic border-2 border-yellow-100 shadow-inner mt-6">
                        建議投遞前，將稅單與退稅程序完整錄影或拍照存證
                      </p>
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>

          {/* Bottom Nav */}
          <div
            ref={bottomRef}
            className={`absolute bottom-0 left-0 right-0 z-40 overflow-x-hidden ui-slide ${hideUI ? 'bottom-hide' : ''}`}
          >
            {view === 'itinerary' && (
              <div className="px-4 pt-3 pb-2">
                <button
                  onClick={() => window.open(`https://www.swpc.noaa.gov/products/aurora-30-minute-forecast`)}
                  className="w-full bg-blue-800 text-white py-3 text-sm font-black italic tracking-widest flex items-center justify-center gap-2 rounded-2xl shadow-xl border border-blue-700/30"
                  title="點擊查看 NOAA 極光預測"
                >
                  🌌 今日 {lastCityName} 極光 KP 值:
                  <span className="text-green-300 text-sm">{kpValue}</span>
                </button>
              </div>
            )}

            <div className="h-28 glass border-t flex justify-around items-center px-4 safe-bottom">
              <button onClick={()=>setView('itinerary')} className={`flex flex-col items-center gap-1 ${view==='itinerary'?'text-blue-600 scale-125 font-black italic':'text-slate-300'}`}>
                <i data-lucide="calendar" size={32}></i><span className="text-base font-black">行程</span>
              </button>
              <button onClick={()=>setView('budget')} className={`flex flex-col items-center gap-1 ${view==='budget'?'text-blue-600 scale-125 font-black italic':'text-slate-300'}`}>
                <i data-lucide="piggy-bank" size={32}></i><span className="text-base font-black">記帳</span>
              </button>
              <button onClick={()=>setView('notice')} className={`flex flex-col items-center gap-1 ${view==='notice'?'text-blue-600 scale-125 font-black italic':'text-slate-300'}`}>
                <i data-lucide="info" size={32}></i><span className="text-base font-black">注意</span>
              </button>
              <button onClick={()=>setView('tax')} className={`flex flex-col items-center gap-1 ${view==='tax'?'text-blue-600 scale-125 font-black italic':'text-slate-300'}`}>
                <i data-lucide="receipt" size={32}></i><span className="text-base font-black">退稅</span>
              </button>
            </div>
          </div>

          {modal && (
            <div className="modal-wrap" onClick={()=>setModal(null)}>
              <div className="modal-card" onClick={e=>e.stopPropagation()}>
                <h3 className="text-4xl font-black mb-6 text-blue-900 italic underline decoration-yellow-200 underline-offset-8 leading-snug break-words">
                  {modal.name}
                </h3>

                <div className="modal-body intro-scroll text-slate-600">
                  {/* ✅ highlight：紅字置頂，跟景點介紹分開 */}
                  {modal.highlight && (
                    <div className="p-6 bg-red-50 rounded-[40px] border-4 border-red-100 text-red-600 text-2xl font-black italic leading-relaxed break-words mb-6">
                      ⚠️ {modal.highlight}
                    </div>
                  )}

                  {modal.transport && (
                    <div className="p-6 bg-sky-50 rounded-[40px] border-4 border-sky-100 text-sky-800 text-2xl font-black italic leading-relaxed break-words mb-6">
                      💡 教學：<br/>{modal.transport}
                    </div>
                  )}
                  {modal.detail && (
                    <div className="text-xl font-black text-slate-400 border-b-4 pb-4 italic uppercase tracking-widest leading-loose break-words mb-6">
                      詳情：<br/>{modal.detail}
                    </div>
                  )}
                  {modal.intro && (
                    <p className="font-black italic whitespace-pre-wrap leading-loose break-words">{modal.intro}</p>
                  )}
                </div>

                {/* ✅ CLOSE 縮小，避免遮擋內文 */}
                <button
                  onClick={() => setModal(null)}
                  className="mt-4 w-full py-3 bg-slate-100 rounded-[26px] font-black text-slate-500 uppercase btn-cute text-xl italic"
                >
                  CLOSE
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
    setTimeout(() => { try { lucide.createIcons(); } catch(e) {} }, 120);
  </script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
